<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Home Page Background with campus theme -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DCC8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#grad1)"/>
  
  <!-- Campus buildings silhouette -->
  <rect x="100" y="600" width="150" height="400" fill="#8B6F47" opacity="0.1"/>
  <rect x="300" y="500" width="200" height="500" fill="#8B6F47" opacity="0.15"/>
  <rect x="550" y="550" width="180" height="450" fill="#8B6F47" opacity="0.12"/>
  <rect x="1200" y="580" width="160" height="420" fill="#8B6F47" opacity="0.1"/>
  <rect x="1400" y="520" width="190" height="480" fill="#8B6F47" opacity="0.13"/>
  <rect x="1650" y="600" width="170" height="400" fill="#8B6F47" opacity="0.11"/>
  
  <!-- Decorative circles -->
  <circle cx="300" cy="200" r="100" fill="#8B6F47" opacity="0.05"/>
  <circle cx="1600" cy="250" r="120" fill="#8B6F47" opacity="0.06"/>
  <circle cx="960" cy="150" r="80" fill="#8B6F47" opacity="0.04"/>
</svg>
